<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dual Image Warp Editor</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#1a1a1a;
    font-family:sans-serif;
}

svg{
    width:100%;
    height:100%;
}

.border{
    fill:none;
    stroke:white;
    stroke-width:2;
}

.handle{
    fill:white;
    stroke:white;
    stroke-width:1;
    cursor:move;
}

.mid{
    fill:none;
    stroke:white;
    stroke-width:2;
}
</style>
</head>

<body>

<svg id="svg">

    <defs>

        <filter id="warpFilter">

            <feTurbulence
                type="fractalNoise"
                baseFrequency="0.01"
                numOctaves="1"
                result="noise"/>

            <feDisplacementMap
                id="displace"
                in="SourceGraphic"
                in2="noise"
                scale="0"/>

        </filter>

    </defs>

    <!-- 左圖 -->
    <image
        id="photoLeft"
        href="clock.png"
        preserveAspectRatio="none"
        filter="url(#warpFilter)">
    </image>

    <!-- 右圖 -->
    <image
        id="photoRight"
        href="clock.png"
        preserveAspectRatio="none"
        filter="url(#warpFilter)">
    </image>

    <polygon
        id="border"
        class="border">
    </polygon>

    <g id="handles"></g>

</svg>

<script>

const svg =
    document.getElementById("svg");

const photoLeft =
    document.getElementById("photoLeft");

const photoRight =
    document.getElementById("photoRight");

const border =
    document.getElementById("border");

const handlesGroup =
    document.getElementById("handles");

const displace =
    document.getElementById("displace");

let activeHandle = null;
let points = [];

const IMAGE_WIDTH = 350;
const IMAGE_HEIGHT = 245;
const GAP = 150;

function initializeCenteredImage(){

    const rect =
        svg.getBoundingClientRect();

    const totalWidth =
        IMAGE_WIDTH +
        GAP +
        IMAGE_WIDTH;

    const left =
        (rect.width - totalWidth) / 2;

    const top =
        (rect.height - IMAGE_HEIGHT) / 2;

    points = [

        {x:left, y:top},
        {x:left + IMAGE_WIDTH/2, y:top},
        {x:left + IMAGE_WIDTH, y:top},

        {x:left + IMAGE_WIDTH, y:top + IMAGE_HEIGHT/2},

        {x:left + IMAGE_WIDTH, y:top + IMAGE_HEIGHT},

        {x:left + IMAGE_WIDTH/2, y:top + IMAGE_HEIGHT},

        {x:left, y:top + IMAGE_HEIGHT},

        {x:left, y:top + IMAGE_HEIGHT/2}

    ];

    createHandles();
    update();
}

function createHandles(){

    handlesGroup.innerHTML = "";

    points.forEach((p,index)=>{

        const size = 8;

        const handle =
            document.createElementNS(
                "http://www.w3.org/2000/svg",
                "rect"
            );

        handle.setAttribute(
            "width",
            size
        );

        handle.setAttribute(
            "height",
            size
        );

        handle.classList.add(
            "handle"
        );

        if([1,3,5,7].includes(index)){
            handle.classList.add("mid");
        }

        handle.addEventListener(
            "pointerdown",
            ()=>{
                activeHandle = index;
            }
        );

        handlesGroup.appendChild(
            handle
        );

    });

}

function update(){

    const handles =
        handlesGroup.querySelectorAll("rect");

    points.forEach((p,i)=>{

        handles[i].setAttribute(
            "x",
            p.x - 4
        );

        handles[i].setAttribute(
            "y",
            p.y - 4
        );

    });

    border.setAttribute(
        "points",
        points
            .map(
                p => `${p.x},${p.y}`
            )
            .join(" ")
    );

    const tl = points[0];
    const tr = points[2];
    const br = points[4];
    const bl = points[6];

    const width =
        ((tr.x - tl.x) +
         (br.x - bl.x)) / 2;

    const height =
        ((bl.y - tl.y) +
         (br.y - tr.y)) / 2;

    photoLeft.setAttribute(
        "x",
        tl.x
    );

    photoLeft.setAttribute(
        "y",
        tl.y
    );

    photoLeft.setAttribute(
        "width",
        width
    );

    photoLeft.setAttribute(
        "height",
        height
    );

    photoRight.setAttribute(
        "x",
        tl.x + width + GAP
    );

    photoRight.setAttribute(
        "y",
        tl.y
    );

    photoRight.setAttribute(
        "width",
        width
    );

    photoRight.setAttribute(
        "height",
        height
    );

    /*
        初始保持完全平整
        拖動後才逐漸增加濾鏡強度
    */

    const distortion =
        Math.abs(points[0].y - points[2].y) +
        Math.abs(points[6].y - points[4].y) +
        Math.abs(points[0].x - points[6].x) +
        Math.abs(points[2].x - points[4].x);

    displace.setAttribute(
        "scale",
        Math.min(
            distortion / 4,
            40
        )
    );
}

window.addEventListener(
    "pointermove",
    (e)=>{

        if(activeHandle===null)
            return;

        const rect =
            svg.getBoundingClientRect();

        const x =
            e.clientX - rect.left;

        const y =
            e.clientY - rect.top;

        switch(activeHandle){

            case 1:

                points[0].y = y;
                points[1].y = y;
                points[2].y = y;

                break;

            case 3:

                points[2].x = x;
                points[3].x = x;
                points[4].x = x;

                break;

            case 5:

                points[4].y = y;
                points[5].y = y;
                points[6].y = y;

                break;

            case 7:

                points[0].x = x;
                points[7].x = x;
                points[6].x = x;

                break;

            default:

                points[activeHandle].x = x;
                points[activeHandle].y = y;

        }

        update();

    }
);

window.addEventListener(
    "pointerup",
    ()=>{
        activeHandle = null;
    }
);

window.addEventListener(
    "load",
    initializeCenteredImage
);

</script>

</body>
</html>
